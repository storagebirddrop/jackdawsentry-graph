events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    upstream jackdawsentry_graph_backend {
        least_conn;
        server graph-api:8000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self'; img-src 'self' data: blob:; font-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

        location /api/ {
            proxy_pass http://jackdawsentry_graph_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/(docs|redoc)$ {
            proxy_pass http://jackdawsentry_graph_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /openapi.json {
            proxy_pass http://jackdawsentry_graph_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /health {
            proxy_pass http://jackdawsentry_graph_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = / {
            return 302 $scheme://$http_host/app/;
        }

        location = /login {
            return 302 $scheme://$http_host/app/;
        }

        location = /graph-login.html {
            return 302 $scheme://$http_host/app/;
        }

        location = /app {
            return 301 $scheme://$http_host/app/;
        }

        location = /app/favicon.svg {
            alias /usr/share/nginx/html/app/dist/favicon.svg;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        location ^~ /app/assets/ {
            alias /usr/share/nginx/html/app/dist/assets/;
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /app/ {
            alias /usr/share/nginx/html/app/dist/;
            index index.html;
            try_files $uri $uri/ /app/index.html;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self'; img-src 'self' data: blob:; font-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        location / {
            try_files $uri =404;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }
    }
}
