name: Security

on:
  pull_request:
  push:
    branches: [main]

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit cyclonedx-bom -r requirements.release.txt

      - name: Python dependency audit
        run: pip-audit -r requirements.release.txt

      - name: Generate Python SBOM
        run: python -m cyclonedx_py requirements requirements.release.txt -o python-sbom.json

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/app
        run: npm ci

      - name: Frontend dependency audit
        working-directory: frontend/app
        run: npm audit --audit-level=high

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: graph-python-sbom
          path: python-sbom.json

  trivy:
    name: Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
