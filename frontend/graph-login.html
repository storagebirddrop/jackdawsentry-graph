<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Jackdaw Sentry Graph</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/app/site.webmanifest">
    <link rel="stylesheet" href="/css/graph-login.css">
    <meta name="theme-color" content="#09111f">
    <meta name="description" content="Jackdaw Sentry Graph sign-in for standalone investigation graph exploration.">
</head>
<body class="graph-login-body">
    <div class="graph-login-shell fade-in">
        <div class="graph-login-brand">
            <img
                src="/favicon.svg"
                alt="Jackdaw Sentry"
                class="graph-login-logo"
            >
            <h1 class="graph-login-title">Jackdaw Sentry Graph</h1>
            <p class="graph-login-subtitle">
                Session-based graph exploration for trace-first blockchain investigations.
            </p>
        </div>

        <div class="graph-login-card">
            <h2 class="graph-login-card-title">Sign in to continue</h2>
            <div id="login-error" class="graph-login-error hidden" role="alert" aria-live="polite"></div>

            <form id="login-form" class="graph-login-form">
                <div class="graph-login-field">
                    <label for="username" class="graph-login-label">Username</label>
                    <input
                        id="username"
                        name="username"
                        type="text"
                        required
                        autocomplete="username"
                        autofocus
                        class="graph-login-input"
                        placeholder="analyst"
                    >
                </div>

                <div class="graph-login-field">
                    <label for="password" class="graph-login-label">Password</label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        required
                        autocomplete="current-password"
                        class="graph-login-input"
                        placeholder="Enter your password"
                    >
                </div>

                <button
                    type="submit"
                    id="login-btn"
                    class="graph-login-button"
                >
                    <span id="login-btn-text">Sign in</span>
                    <svg id="login-spinner" class="graph-login-spinner hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="graph-login-spinner-track" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="graph-login-spinner-head" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </button>
            </form>
        </div>
    </div>
    <script src="/js/auth.js"></script>
    <script src="/js/graph-login.js"></script>
</body>
</html>
